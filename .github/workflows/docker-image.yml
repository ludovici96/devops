name: Docker Build and Push

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Get version number
      id: version
      run: |
        VERSION_MAJOR=1
        VERSION_MINOR=$(git rev-list --count HEAD)
        VERSION_PATCH=$(git rev-parse --short HEAD)
        echo "::set-output name=version::${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"

    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: ./flask-example
        push: true
        tags: alisi18/flask-example:${{ steps.version.outputs.version }}
